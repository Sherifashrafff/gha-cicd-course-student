name: 04 Deploy Workflow

on:
  workflow_run:
    workflows: ["02-03 CI and Build Artifact Workflow"]
    types: [completed]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: myrepo
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"
  AWS_AUTH_METHOD: "access-key"

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  deploy-package:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        if: env.AWS_AUTH_METHOD == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access Key)
        if: env.AWS_AUTH_METHOD == 'access-key'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download image tag artifact
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: .

      - name: Read image tag
        id: image-tag
        run: |
          IMAGE_TAG="$(cat image-tag.txt)"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: $IMAGE_TAG"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            # --- Auth to ECR from EC2 (uses attached IAM role, no creds needed) ---
            ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
            IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.image_tag }}"

            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # --- Pull the tagged image ---
            docker pull "$IMAGE"

            # --- Stop and remove the old container if running ---
            docker rm -f ${{ env.CONTAINER_NAME }} || true

            # --- Run the new container ---
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.APP_PORT }}:8000 \
              "$IMAGE"

            # --- Smoke test on EC2 itself ---
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent "http://127.0.0.1:${{ env.APP_PORT }}/health"; then
                echo "App is healthy."
                exit 0
              fi
              echo "Attempt $attempt — waiting..."
              sleep 3
            done
            echo "App did not become healthy."
            exit 1

      - name: Confirm deployment
        run: echo "Deployed ${{ steps.image-tag.outputs.image_tag }} to EC2 at ${{ secrets.EC2_HOST }}:${{ env.APP_PORT }}"